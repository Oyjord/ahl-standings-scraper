name: Upload Standings to S3

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 23-23 * * *'
    - cron: '*/15 0-7 * * *'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload standings.json to S3 as reign_standings.json
        run: aws s3 cp standings.json s3://${{ secrets.AWS_S3_BUCKET }}/reign_standings.json --cache-control "no-cache, no-store, must-revalidate"
