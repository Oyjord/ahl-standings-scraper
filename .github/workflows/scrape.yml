name: Scrape AHL Standings

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 23-23 * * *'
    - cron: '*/15 0-7 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      # ⭐ Regular season scraper (unchanged)
      - name: Run regular-season scraper
        run: npm run scrape

      # ⭐ NEW — Playoffs scraper
      - name: Run playoffs scraper
        run: npm run playoffs

      # ⭐ Commit both outputs
      - name: Commit updated standings + playoffs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add standings.json debug.txt raw.html
          git add playoffs.json playoffs_debug.txt raw_playoffs.html
          git commit -m "Update AHL regular + playoff standings" || echo "No changes to commit"
          git push || echo "No changes to push"
