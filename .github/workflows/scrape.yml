name: Scrape AHL Standings

on:
  workflow_dispatch:
  # Covers 4 PM to 11 PM PT (which is 23:00–06:59 UTC)
  schedule:
    - cron: '*/30 23-23 * * *'  # 4 PM PT
    - cron: '*/15 0-7 * * *'    # 5 PM to 11 PM PT

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated standings
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add standings.json debug.txt raw.html
          git commit -m "Update Pacific Division standings" || echo "No changes to commit"
          git push || echo "No changes to push"

      # ⭐ AWS upload block
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload standings.json to S3 as reign_standings.json
        run: |
          aws s3 cp standings.json s3://${{ secrets.AWS_S3_BUCKET }}/reign_standings.json \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "✅ Uploaded reign_standings.json to S3"
